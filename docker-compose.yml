services:
  bitrix-document-ai-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitrix-document-ai-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      APP_DATA_DIR: /data
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - bitrix-document-ai-bot-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  bitrix-document-ai-bot-data:
